<link rel="import" href="../components/polymer/polymer.html">

<polymer-element name="skill-rating" attributes="rating name description">
    <template>
        <style>
            .wrapper{
                position: relative;
                box-sizing: border-box;
                -moz-box-sizing: border-box;
                -webkit-box-sizing: border-box;
                width: 100%;
                height: 30px;
                margin-bottom: 5px;
            }
            .bar{ 
                width: 100%;
                border-radius: 5px;
                height: 30px;
                background-color: #E5E5E5;
                position: relative;
            }
            .percentage{
                position: absolute;
                right: 10px;
                top: 5px;
            }
            .fill{
                position: absolute;
                border-radius: 5px;
                left: 0px;
                top: 0px;
                bottom: 0px;
                width: {{rating}}%;
                background-color: #b7d3eb;
            }
        </style>
        <div layout horizontal title='{{description}}' class="wrapper">
            <div flex one indent><content></content></div>
            <div flex three><div class='bar'><div class='fill'></div><div class='percentage'>{{rating}}%</div></div></div>
        </div>
    </template>
    <script>
        Polymer({
            ready: function () {
                
            }
        });
    </script>
</polymer-element>
